workflows:
  android-workflow:
    name: Android Release Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze project
        script: flutter analyze
      - name: Build Android App Bundle
        script: flutter build appbundle --release
      - name: Build Android APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk

  ios-workflow:
    name: iOS Simulator ZIP Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..
      - name: Build iOS simulator app without code signing
        script: |
          flutter build ios --config-only
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
      - name: Package simulator app as zip
        script: |
          APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*Build/Products/Release-iphonesimulator/Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found in DerivedData"
            exit 1
          fi
          mkdir -p build/ios/simulator
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/ios/simulator/Runner-simulator.zip
    artifacts:
      - build/ios/simulator/*.zip
