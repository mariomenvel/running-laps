name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Mantener alineado con la versión de desarrollo local.
          # fl_chart >=1.1.0 usa APIs de Matrix4 que no existen en 3.32.
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test unitarios
        run: flutter test test/unit/ --reporter=github

      - name: Test de modelos y repositorios (Firestore simulado)
        run: flutter test test/features/ --reporter=github

      - name: Test de widget
        run: flutter test test/widget/ --reporter=github
